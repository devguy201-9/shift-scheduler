services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shift
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d shift" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"

  data-service:
    build:
      context: .
      dockerfile: data-service/Dockerfile
    depends_on:
      postgres:
          condition: service_healthy
    environment:
      APP_ENV: docker
    ports:
      - "8080:8080"

  scheduling-service:
    build:
      context: .
      dockerfile: scheduling-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      data-service:
        condition: service_started
    environment:
      APP_ENV: docker
    volumes:
      - ./scheduling-service/config.yaml:/app/config.yaml
    ports:
      - "8081:8081"